<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Botaemic Updates</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 48px 24px;
      max-width: 820px;
      line-height: 1.5;
      color: #1f2328;
      background: #ffffff;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      font-weight: 650;
    }

    p {
      margin: 0 0 14px;
      font-size: 16px;
    }

    code {
      background: #f6f8fa;
      border-radius: 4px;
      padding: 2px 5px;
    }

    a {
      color: #0969da;
    }

    .links {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #d8dee4;
    }

    @media (prefers-color-scheme: dark) {
      body {
        color: #e6edf3;
        background: #0d1117;
      }

      code {
        background: #161b22;
      }

      a {
        color: #58a6ff;
      }

      .links {
        border-top-color: #30363d;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Botaemic Updates</h1>
    <p>This site hosts update feeds and release artifacts for Botaemic projects.</p>
    <p>Project artifacts are organized by category, product, and release version.</p>

    <div class="links">
      <p>Current SoundController feed: <a href="https://raw.githubusercontent.com/Botaemic/Updates/main/manifest.json"><code>manifest.json</code></a></p>
      <p>GitHub repository: <a href="https://github.com/Botaemic/Updates"><code>Botaemic/Updates</code></a></p>
    </div>
  </main>
</body>
</html>
